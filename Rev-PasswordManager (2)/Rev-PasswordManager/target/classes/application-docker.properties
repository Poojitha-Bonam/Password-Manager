# Docker-specific Spring Boot Configuration

# Application
spring.application.name=Rev-PasswordManager
server.port=8080

# Database - Use environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/rev_password_manager?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:appuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:apppassword}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.sql.init.mode=always

# JWT Configuration
jwt.secret=${JWT_SECRET:450d0b0db2bcfcadd57512760233475d4a65476a6d65476a6d65476a6d65476a}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# Encryption
encryption.algorithm=AES/GCM/NoPadding
encryption.key-size=256
pbkdf2.iterations=100000

# Logging
logging.level.root=INFO
logging.level.com.revature=INFO
logging.file.name=${LOGGING_FILE_NAME:/app/logs/password-manager.log}
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Email Configuration
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# AI Configuration
ai.openai.api-key=${AI_OPENAI_API_KEY:}

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
secure.files.storage-path=${SECURE_FILES_STORAGE_PATH:/app/secure-files}

# CORS - More permissive for Docker internal networking
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://frontend}
